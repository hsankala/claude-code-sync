# claude-code-sync.yaml
#
# This is the config for the claude-code-sync repo itself.
# Plain filenames resolve from ai-docs/ (project-specific docs).
# Path-prefixed entries (e.g. ai-doc-library/...) resolve from project root.
# Remote entries: full https:// URL
# Order in list = order in assembled output

github_base_url:     https://raw.githubusercontent.com/hsankala/claude-code-sync/main
script_path_ps1:     tools/sync-claude-code.ps1
script_path_sh:      tools/sync-claude-code.sh
disable_self_update: true
structure_map:       true

# --------------------------------------------------------------------------
# Launcher — generates tools/open-claude.ps1 to open Claude Code in a new
# Windows Terminal tab pointing at this project's WSL environment.
# Remove this section if you don't want a launcher generated.
# --------------------------------------------------------------------------
launcher:
  mode:          wsl                                        # wsl (default) or ssh
  wsl_distro:    WordPress_Dev                              # WSL instance name (wsl -l to list)
  project_path:  /mnt/c/tools/claude-code-sync              # Absolute path inside WSL
  claude_path:   /home/hefin/.local/bin/claude              # Full path to claude executable
  tab_title:     CLAUDE-CODE-SYNC                           # Windows Terminal tab title
  tab_color:     "#002B36"                                  # Windows Terminal tab colour (hex)
  extra_dirs:                                               # Additional --add-dir paths (optional)
    - /mnt/c/Users/hsank/Documents/ShareX/Screenshots

# --------------------------------------------------------------------------
# CLAUDE.md — full memory file for Claude Code
# --------------------------------------------------------------------------
claude_md:
  - about-claude-code-sync.md
  - directory-guide.md
  - file-tree.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/coding-conventions.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/code-comments.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/speech-to-text.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/chat-guidelines.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/chat-response-style-guide.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/chat-session-banners.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/ai-roleplay-and-collaboration.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/tool-transparency.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/claude-git-usage-windows.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/claude-code-sync-guide.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/ai-doc-library/mcp-servers.md

# --------------------------------------------------------------------------
# Web AI doc — subset for sharing with web-based AI assistants
# Excludes tooling-specific and Claude Code-specific docs
# --------------------------------------------------------------------------
web_ai_doc_filename: CLAUDE-WEB-AI.md
web_ai_doc:
  - about-claude-code-sync.md
  - directory-guide.md
  - file-tree.md

# --------------------------------------------------------------------------
# Skills — synced to .claude/commands/
# Entries with a path separator are resolved relative to the project root
# --------------------------------------------------------------------------
skills:
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/baby-step.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/commit.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/init-project.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/summary.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/think.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/farm-it-out.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/architect.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/mcp-setup-context7.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/mcp-setup-mysql.md
  - https://raw.githubusercontent.com/hsankala/claude-code-sync/main/skills/mcp-setup-chrome-devtools.md
